name: snf-schedule-optimizer-demo

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  seeder:
    build:
      context: .
      dockerfile: snf-schedule-optimizer-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    command: python -m snf_schedule_optimizer.infrastructure.demo_bootstrap

  app:
    build:
      context: .
      dockerfile: snf-schedule-optimizer-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ALLOW_ORIGINS: http://localhost:${DEMO_UI_PORT:-3000}
    ports:
      - "${DEMO_API_PORT:-8080}:8000"
    depends_on:
      seeder:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: snf-schedule-optimizer-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPTIMIZATION_WORKER_ID: demo-worker
    depends_on:
      seeder:
        condition: service_completed_successfully
    command: python -m snf_schedule_optimizer.api.worker_main
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: snf-schedule-optimizer-ui/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${DEMO_API_PORT:-8080}
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${DEMO_API_PORT:-8080}
    ports:
      - "${DEMO_UI_PORT:-3000}:3000"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://0.0.0.0:3000').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
