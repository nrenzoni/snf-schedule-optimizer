name: snf-schedule-optimizer-dev

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  seeder:
    build:
      context: .
      dockerfile: snf-schedule-optimizer-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./snf-schedule-optimizer-service/src:/app/src
    depends_on:
      db:
        condition: service_healthy
    command: python -m snf_schedule_optimizer.infrastructure.demo_bootstrap
    profiles: ["tools"]

volumes:
  pgdata-dev:
