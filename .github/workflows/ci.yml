name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_demo_smoke:
        description: Run full Docker demo smoke job
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      backend: ${{ steps.filter.outputs.backend }}
      proto: ${{ steps.filter.outputs.proto }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ui:
              - 'snf-schedule-optimizer-ui/**'
            backend:
              - 'snf-schedule-optimizer-service/**'
            proto:
              - 'proto/**'
            shared:
              - 'compose*.yml'
              - '**/Dockerfile*'
              - 'justfile'
              - 'AGENTS.md'
              - '.github/workflows/**'
              - 'README.md'

  ui:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ui == 'true' || needs.changes.outputs.proto == 'true' || needs.changes.outputs.shared == 'true'
    defaults:
      run:
        working-directory: snf-schedule-optimizer-ui
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.0

      - name: Install UI dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint UI
        run: pnpm lint

      - name: Typecheck UI
        run: pnpm typecheck

      - name: Run UI unit tests
        run: pnpm test:unit

      - name: Build UI
        run: pnpm build

  backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.proto == 'true' || needs.changes.outputs.shared == 'true'
    defaults:
      run:
        working-directory: snf-schedule-optimizer-service
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Generate backend proto outputs
        run: npm install --no-package-lock && npx buf generate && python3 post_generate_fix_imports.py
        working-directory: proto

      - name: Sync backend dependencies
        run: uv sync

      - name: Ruff check
        run: PYTHONPATH=src uv run ruff check .

      - name: MyPy
        run: PYTHONPATH=src uv run mypy

      - name: Pytest
        run: PYTHONPATH=src uv run pytest

  proto:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate proto outputs
        run: npm install --no-package-lock && npx buf generate && python3 post_generate_fix_imports.py
        working-directory: proto

      - name: Ensure generated code is committed
        run: git diff --exit-code -- proto snf-schedule-optimizer-ui/gen snf-schedule-optimizer-service/src/snf_schedule_optimizer/generated

  demo-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_demo_smoke
    steps:
      - uses: actions/checkout@v6

      - name: Build and start demo stack
        run: docker compose -f compose.demo.yml up --build -d

      - name: Check API health
        run: curl --fail --retry 20 --retry-delay 3 http://localhost:8080/health

      - name: Check UI health
        run: curl --fail --retry 20 --retry-delay 3 http://localhost:3000

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f compose.demo.yml logs

      - name: Tear down demo stack
        if: always()
        run: docker compose -f compose.demo.yml down -v
