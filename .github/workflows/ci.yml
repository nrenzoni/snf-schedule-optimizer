name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_demo_smoke:
        description: Run full Docker demo smoke job
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      backend: ${{ steps.filter.outputs.backend }}
      proto: ${{ steps.filter.outputs.proto }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ui:
              - 'snf-schedule-optimizer-ui/**'
            backend:
              - 'snf-schedule-optimizer-service/**'
            proto:
              - 'proto/**'
            shared:
              - 'compose*.yml'
              - '**/Dockerfile*'
              - 'justfile'
              - 'AGENTS.md'
              - '.github/workflows/**'
              - 'README.md'

  ui:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ui == 'true' || needs.changes.outputs.proto == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.0

      - uses: extractions/setup-just@v4
        with:
          just-version: '1.51.0'

      - name: Install UI dependencies
        run: pnpm install --frozen-lockfile
        working-directory: snf-schedule-optimizer-ui

      - name: Check UI
        run: just check-ui

  backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.proto == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - uses: extractions/setup-just@v4
        with:
          just-version: '1.51.0'

      - name: Install backend dependencies
        run: just install-be

      - name: Generate proto
        run: just proto

      - name: Check backend
        run: just check-be

  proto:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: extractions/setup-just@v4
        with:
          just-version: '1.51.0'

      - name: Generate proto outputs
        run: just proto

      - name: Ensure generated code is committed
        run: git diff --exit-code -- proto snf-schedule-optimizer-ui/gen snf-schedule-optimizer-service/src/snf_schedule_optimizer/generated

  demo-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_demo_smoke
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - uses: extractions/setup-just@v4
        with:
          just-version: '1.51.0'

      - name: Build and start demo stack
        run: just smoke-demo

      - name: Check API health
        run: just smoke-demo-check

      - name: Dump compose logs on failure
        if: failure()
        run: just demo-logs

      - name: Tear down demo stack
        if: always()
        run: just demo-down
