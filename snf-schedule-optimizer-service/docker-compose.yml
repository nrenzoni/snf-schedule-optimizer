version: '3.8'

services:
  db:
    image: postgres:18-alpine
    container_name: snf-optimizer-db
    environment:
      POSTGRES_USER: snf_user
      POSTGRES_PASSWORD: snf_password
      POSTGRES_DB: snf_optimizer_demo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U snf_user -d snf_optimizer_demo" ]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # One-shot service to handle schema creation and seeding
  seeder:
    build: .
    container_name: snf-optimizer-seeder
    environment:
      DATABASE_URL: postgresql+asyncpg://snf_user:snf_password@db:5432/snf_optimizer_demo
    depends_on:
      db:
        condition: service_healthy
    command: python /app/src/snf_schedule_optimizer/infrastructure/demo_bootstrap.py

  # Main API Service
  app:
    build: .
    container_name: snf-optimizer-api
    environment:
      DATABASE_URL: postgresql+asyncpg://snf_user:snf_password@db:5432/snf_optimizer_demo
    depends_on:
      seeder:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    command: python /app/src/snf_schedule_optimizer/api/main.py

volumes:
  pgdata: