services:
  db:
    image: postgres:18-alpine
    container_name: snf-optimizer-db
    environment:
      POSTGRES_USER: snf_user
      POSTGRES_PASSWORD: snf_password
      POSTGRES_DB: snf_optimizer_demo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U snf_user -d snf_optimizer_demo" ]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5435:5432"  # host port 5435 to avoid local conflicts, internally still 5432

  # One-shot service to handle schema creation and seeding
  seeder:
    build: .
    container_name: snf-optimizer-seeder
    environment:
      DATABASE_URL: postgresql+asyncpg://snf_user:snf_password@db:5432/snf_optimizer_demo
      UV_SYSTEM_PYTHON: 1
    depends_on:
      db:
        condition: service_healthy
    command: python -m snf_schedule_optimizer.infrastructure.demo_bootstrap

  # Main API Service
  app:
    build: .
    container_name: snf-optimizer-api
    environment:
      DATABASE_URL: postgresql+asyncpg://snf_user:snf_password@db:5432/snf_optimizer_demo
      UV_SYSTEM_PYTHON: 1
    depends_on:
      seeder:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    command: python -m snf_schedule_optimizer.api.main

volumes:
  pgdata: