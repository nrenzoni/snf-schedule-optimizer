syntax = "proto3";

package scheduling.v1;

// The main service used to interact with shift and staffing data.
service SchedulingService {

  // admin section
  rpc GetAllOrgFacilities(GetAllOrgFacilitiesRequest) returns (GetAllOrgFacilitiesResponse);
  // 

  // Retrieves the schedule and HRPD metrics for a given date range (usually a month).
  rpc GetMonthlySchedule(GetMonthlyScheduleRequest) returns (GetMonthlyScheduleResponse);

  // Returns lightweight version/run status for the current schedule workspace.
  rpc GetScheduleStatus(GetScheduleStatusRequest) returns (GetScheduleStatusResponse);

  // Runs a full optimization pass and optionally persists the resulting schedule.
  rpc OptimizeSchedule(OptimizeScheduleRequest) returns (OptimizeScheduleResponse);

  // Starts a long-running optimization run against the current schedule plus staged patches.
  rpc StartOptimizationRun(StartOptimizationRunRequest) returns (StartOptimizationRunResponse);

  // Returns the latest persisted state for a long-running optimization run.
  rpc GetOptimizationRun(GetOptimizationRunRequest) returns (GetOptimizationRunResponse);

  // Streams status snapshots for a long-running optimization run.
  rpc StreamOptimizationRun(StreamOptimizationRunRequest) returns (stream OptimizationRunEvent);

  // Validates if a specific move (drag & drop) is feasible against all business rules.
  // This is used for real-time validation in the UI.
  rpc ValidateShiftMove(ValidateShiftMoveRequest) returns (ValidateShiftMoveResponse);

  // Example for future mutation: Removes a nurse from a specific shift.
  rpc RemoveNurseFromShift(RemoveNurseFromShiftRequest) returns (RemoveNurseFromShiftResponse);

  // Batch mutations for removing nurses from multiple shifts in one call.
  rpc BatchRemoveNursesFromShifts(BatchRemoveNursesFromShiftsRequest) returns (BatchRemoveNursesFromShiftsResponse);

  // Batch validation of multiple shift moves in one call.
  rpc BatchValidateShiftMoves(BatchValidateShiftMovesRequest) returns (BatchValidateShiftMovesResponse);
}



// --- Requests and Responses ---

message GetAllOrgFacilitiesRequest {}

message GetAllOrgFacilitiesResponse {
  repeated OrgFacility all_org_facilities = 1;
}

message GetMonthlyScheduleRequest {
  // Dates in YYYY-MM-DD format for the inclusive schedule range to query.
  string org_id = 1;
  optional string facility_id = 2;
  string start_date = 3;
  optional string end_date = 4;
  int32 page_size = 5;
  string page_token = 6;
}

message GetMonthlyScheduleResponse {
  // A map where the key is the date (YYYY-MM-DD) and the value is the schedule for that day.
  map<string, DaySchedule> schedules = 1;
  string facility_id = 2;
  string schedule_id = 3;
  int32 schedule_version = 4;
  OptimizationSummary latest_optimization = 5;
  OptimizationStats latest_optimization_stats = 6;
  FinancialReport latest_optimization_financials = 7;
  OptimizationRun active_optimization_run = 8;
  string updated_at = 9;
  string next_page_token = 10;
  int32 total_days = 11;
}

message GetScheduleStatusRequest {
  string org_id = 1;
  string facility_id = 2;
  string schedule_id = 3;
  int32 current_schedule_version = 4;
}

message GetScheduleStatusResponse {
  string schedule_id = 1;
  int32 latest_schedule_version = 2;
  bool has_newer_version = 3;
  OptimizationRun active_optimization_run = 4;
  OptimizationSummary latest_optimization = 5;
  OptimizationStats latest_optimization_stats = 6;
  FinancialReport latest_optimization_financials = 7;
  string updated_at = 8;
}

message OptimizeScheduleRequest {
  string org_id = 1;
  string facility_id = 2;
  string start_date = 3;
  optional string end_date = 4;
  OptimizationSettings settings = 5;
  bool persist_result = 6;
}

message OptimizeScheduleResponse {
  bool is_success = 1;
  string error_details = 2;
  map<string, DaySchedule> schedules = 3;
  string facility_id = 4;
  string schedule_id = 5;
  int32 schedule_version = 6;
  FinancialReport financials = 7;
  OptimizationStats stats = 8;
  OptimizationSummary summary = 9;
}

message StartOptimizationRunRequest {
  string org_id = 1;
  string facility_id = 2;
  string schedule_id = 3;
  int32 base_schedule_version = 4;
  string start_date = 5;
  optional string end_date = 6;
  OptimizationSettings settings = 7;
  bool persist_result = 8;
  string client_request_id = 9;
  repeated StagedSchedulePatch staged_patches = 10;
  bool allow_overwrite = 11;
}

message StartOptimizationRunResponse {
  bool accepted = 1;
  string error_details = 2;
  bool version_conflict = 3;
  int32 latest_schedule_version = 4;
  OptimizationRun run = 5;
  repeated PatchConflict conflicts = 6;
}

message GetOptimizationRunRequest {
  string run_id = 1;
}

message GetOptimizationRunResponse {
  bool found = 1;
  OptimizationRun run = 2;
  map<string, DaySchedule> schedules = 3;
}

message StreamOptimizationRunRequest {
  string run_id = 1;
}

message OptimizationRunEvent {
  int64 sequence = 1;
  OptimizationRun run = 2;
  map<string, DaySchedule> schedules = 3;
}

message ValidateShiftMoveRequest {
  string org_id = 1;
  string facility_id = 2;
  string schedule_id = 3;
  string employee_id = 4;
  // The shift the employee is moving from (empty if new assignment)
  string from_shift_id = 5;
  // The shift the employee is moving to (empty if removing assignment)
  string to_shift_id = 6;
  // Unix timestamp (seconds) for the start of the pay period
  int64 pay_period_start_ts = 7;
  // Optional version check to prevent stale updates
  int32 schedule_version = 8;
  repeated StagedSchedulePatch staged_patches = 9;
  string patch_id = 10;
}

message ValidateShiftMoveResponse {
  bool is_success = 1;
  bool is_valid = 2;
  ValidationLevel validation_level = 3;
  // Detailed diagnostic report if is_success is false
  string error_details = 4;
  // The updated schedule state after staged patches plus this move.
  map<string, DaySchedule> affected_schedules = 5;
  // Impact on the budget/financials
  FinancialReport financials = 6;
  // Internal solver metrics
  OptimizationStats stats = 7;
  // Convenient top-level access to the resulting cost
  double total_cost = 8;
  repeated string warnings = 9;
  StagedSchedulePatch patch = 10;
  int32 latest_schedule_version = 11;
  bool is_stale = 12;
  repeated PatchConflict conflicts = 13;
}

message RemoveNurseFromShiftRequest {
  string shift_date = 1;      // Date of the shift (YYYY-MM-DD)
  string shift_name = 2;      // Morning, Afternoon, or Night
  string nurse_id = 3;        // ID of the nurse to remove
}

message RemoveNurseFromShiftResponse {
  bool success = 1;
  string message = 2;
  // Optionally return the updated DaySchedule
  DaySchedule updated_schedule = 3;
}

message BatchRemoveNursesFromShiftsRequest {
  repeated RemoveNurseFromShiftRequest removals = 1;
}

message BatchRemoveNursesFromShiftsResponse {
  repeated RemoveNurseFromShiftResponse results = 1;
  int32 success_count = 2;
  int32 failure_count = 3;
}

message BatchValidateShiftMovesRequest {
  repeated ValidateShiftMoveRequest moves = 1;
}

message BatchValidateShiftMovesResponse {
  repeated ValidateShiftMoveResponse move_results = 1;
  int32 total_conflicts = 2;
}

enum ValidationLevel {
  VALIDATION_LEVEL_UNSPECIFIED = 0;
  VALIDATION_OK = 1;
  VALIDATION_WARNING = 2;
  VALIDATION_CRITICAL = 3;
  VALIDATION_STALE = 4;
}

enum OptimizationRunStatus {
  OPTIMIZATION_RUN_STATUS_UNSPECIFIED = 0;
  OPTIMIZATION_RUN_STATUS_QUEUED = 1;
  OPTIMIZATION_RUN_STATUS_RUNNING = 2;
  OPTIMIZATION_RUN_STATUS_COMPLETED = 3;
  OPTIMIZATION_RUN_STATUS_FAILED = 4;
}

enum OptimizationRunStage {
  OPTIMIZATION_RUN_STAGE_UNSPECIFIED = 0;
  OPTIMIZATION_RUN_STAGE_QUEUED = 1;
  OPTIMIZATION_RUN_STAGE_SNAPSHOTTING = 2;
  OPTIMIZATION_RUN_STAGE_INDEXING = 3;
  OPTIMIZATION_RUN_STAGE_BUILDING_MODEL = 4;
  OPTIMIZATION_RUN_STAGE_SOLVING = 5;
  OPTIMIZATION_RUN_STAGE_ANALYZING = 6;
  OPTIMIZATION_RUN_STAGE_PUBLISHING = 7;
  OPTIMIZATION_RUN_STAGE_COMPLETED = 8;
  OPTIMIZATION_RUN_STAGE_FAILED = 9;
}

message StagedSchedulePatch {
  string patch_id = 1;
  string employee_id = 2;
  string employee_name = 3;
  string from_shift_id = 4;
  string to_shift_id = 5;
  bool pinned = 6;
  repeated string warnings = 7;
  ValidationLevel validation_level = 8;
  bool causes_overtime = 9;
  double total_cost = 10;
  string created_at = 11;
}

message PatchConflict {
  string patch_id = 1;
  string employee_id = 2;
  string employee_name = 3;
  string from_shift_id = 4;
  string to_shift_id = 5;
  string reason = 6;
  string latest_shift_id = 7;
}

message OptimizationRun {
  string run_id = 1;
  string schedule_id = 2;
  int32 base_schedule_version = 3;
  int32 result_schedule_version = 4;
  OptimizationRunStatus status = 5;
  OptimizationRunStage stage = 6;
  int32 progress_percent = 7;
  string status_message = 8;
  string started_at = 9;
  string completed_at = 10;
  string error_details = 11;
  FinancialReport financials = 12;
  OptimizationStats stats = 13;
  OptimizationSummary summary = 14;
}

// --- Data Structures ---

message OrgFacility {
  string org_id = 1;
  string facility_id = 2;
}

message FinancialReport {
  double total_enterprise_cost = 1;
  double total_incentive_cost = 2;
  double total_overtime_cost = 3;
  double regular_pay_cost = 4;
}

message OptimizationStats {
  double execution_time_ms = 1;
  double objective_value = 2;
  int32 total_variables = 3;
  int32 total_constraints = 4;
}

message OptimizationSettings {
  bool use_ml_forecast = 1;
  bool use_callout_buffer = 2;
  int32 buffer_threshold = 3;
  int32 min_rest_period = 4;
  double max_shift_length = 5;
  bool premium_weekend = 6;
  bool premium_holiday = 7;
  double overtime_avoidance_penalty = 8;
  double team_consistency_penalty = 9;
  double high_risk_shift_penalty = 10;
  double custom_preference_penalty = 11;
}

message OptimizationSummary {
  int32 assignments_changed = 1;
  int32 total_assignments = 2;
  int32 covered_shifts = 3;
  int32 uncovered_shifts = 4;
  string completed_at = 5;
  OptimizationSettings applied_settings = 6;
}

message Nurse {
  string id = 1;
  string name = 2;
  double shift_hours = 3;
  string scheduling_rationale = 4;
  string role = 5;
  bool is_agency = 6;
}

message Shift {
  string shift_id = 1;
  string shift_name = 2; // "Morning", "Afternoon", "Night"
  int32 patient_census = 3;
  double target_hrpd = 4;
  double actual_hrpd = 5;
  bool is_hrpd_met = 6;
  repeated Nurse nurses = 7;
  string unit_id = 8;
  string unit_name = 9;
}

message DaySchedule {
  string date = 1; // YYYY-MM-DD
  repeated Shift shifts = 2;
}
