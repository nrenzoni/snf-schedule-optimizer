syntax = "proto3";

package scheduling.v1;

// The main service used to interact with shift and staffing data.
service SchedulingService {

  // admin section
  rpc GetAllOrgFacilities(GetAllOrgFacilitiesRequest) returns (GetAllOrgFacilitiesResponse);
  // 

  // Retrieves the schedule and HRPD metrics for a given date range (usually a month).
  rpc GetMonthlySchedule(GetMonthlyScheduleRequest) returns (GetMonthlyScheduleResponse);

  // Validates if a specific move (drag & drop) is feasible against all business rules.
  // This is used for real-time validation in the UI.
  rpc ValidateShiftMove(ValidateShiftMoveRequest) returns (ValidateShiftMoveResponse);

  // Example for future mutation: Removes a nurse from a specific shift.
  rpc RemoveNurseFromShift(RemoveNurseFromShiftRequest) returns (RemoveNurseFromShiftResponse);
}



// --- Requests and Responses ---

message GetAllOrgFacilitiesRequest {}

message GetAllOrgFacilitiesResponse {
  repeated OrgFacility all_org_facilities = 1;
}

message GetMonthlyScheduleRequest {
  // Date in YYYY-MM-DD format, usually the start of the month to query.
  string org_id = 1;
  optional string facility_id = 2;
  string start_date = 3;
}

message GetMonthlyScheduleResponse {
  // A map where the key is the date (YYYY-MM-DD) and the value is the schedule for that day.
  map<string, DaySchedule> schedules = 1;
  string facility_id = 2;
}

message ValidateShiftMoveRequest {
  string org_id = 1;
  string facility_id = 2;
  string schedule_id = 3;
  string employee_id = 4;
  // The shift the employee is moving from (empty if new assignment)
  string from_shift_id = 5;
  // The shift the employee is moving to (empty if removing assignment)
  string to_shift_id = 6;
  // Unix timestamp (seconds) for the start of the pay period
  int64 pay_period_start_ts = 7;
  // Optional version check to prevent stale updates
  int32 schedule_version = 8;
}

message ValidateShiftMoveResponse {
  bool is_success = 1;
  // Detailed diagnostic report if is_success is false
  string error_details = 2;
  // The updated schedule state after the move
  DaySchedule updated_schedule = 3;
  // Impact on the budget/financials
  FinancialReport financials = 4;
  // Internal solver metrics
  OptimizationStats stats = 5;
  // Convenient top-level access to the resulting cost
  double total_cost = 6;
}

message RemoveNurseFromShiftRequest {
  string shift_date = 1;      // Date of the shift (YYYY-MM-DD)
  string shift_name = 2;      // Morning, Afternoon, or Night
  string nurse_id = 3;        // ID of the nurse to remove
}

message RemoveNurseFromShiftResponse {
  bool success = 1;
  string message = 2;
  // Optionally return the updated DaySchedule
  DaySchedule updated_schedule = 3;
}

// --- Data Structures ---

message OrgFacility {
  string org_id = 1;
  string facility_id = 2;
}

message FinancialReport {
  double total_enterprise_cost = 1;
  double total_incentive_cost = 2;
  double total_overtime_cost = 3;
  double regular_pay_cost = 4;
}

message OptimizationStats {
  double execution_time_ms = 1;
  double objective_value = 2;
  int32 total_variables = 3;
  int32 total_constraints = 4;
}

message Nurse {
  string id = 1;
  string name = 2;
  double shift_hours = 3;
  string scheduling_rationale = 4;
}

message Shift {
  string shift_id = 1;
  string shift_name = 2; // "Morning", "Afternoon", "Night"
  int32 patient_census = 3;
  double target_hrpd = 4;
  double actual_hrpd = 5;
  bool is_hrpd_met = 6;
  repeated Nurse nurses = 7;
}

message DaySchedule {
  string date = 1; // YYYY-MM-DD
  repeated Shift shifts = 2;
}